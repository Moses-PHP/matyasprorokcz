<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matyáš Prorok</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <main class="hero">
    <div class="cursor-glow" id="glow"></div>

    <div class="content">
      <p class="label" id="label">—</p>
      <h1 class="name">Matyáš<br>Prorok</h1>
      <div class="line"></div>
      <p class="url">matyasprorok.cz</p>
    </div>
  </main>

  <!-- Trigger tlačítko -->
  <button class="news-trigger" id="news-trigger" aria-label="Otevřít zprávy">
    <span class="news-trigger-label">ZPRÁVY</span>
    <span class="news-trigger-key">N</span>
  </button>

  <!-- Boční panel zpráv -->
  <aside class="news-panel" id="news-panel" aria-hidden="true">
    <div class="news-panel-header">
      <span class="news-panel-title">POLITIKA &amp; OBRANA</span>
      <button class="news-panel-close" id="news-panel-close" aria-label="Zavřít">×</button>
    </div>
    <div class="news-panel-source">iDnes.cz</div>
    <ul class="news-list" id="news-list">
      <li class="news-loading">Načítám zprávy…</li>
    </ul>
  </aside>

  <!-- Overlay pro zavření kliknutím mimo panel -->
  <div class="news-overlay" id="news-overlay"></div>

  <script src="script.js"></script>
</body>
</html>
