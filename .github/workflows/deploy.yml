name: Deploy to FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Disable IPv6
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
      - name: FTP Deploy
        uses: Wandalen/wretry.action@v1.3.2
        with:
          action: SamKirkland/FTP-Deploy-Action@v4.3.4
          with: |
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            protocol: ftps
            server-dir: /public_html/
          attempt_limit: 3
          attempt_delay: 15000 # milliseconds between retries
